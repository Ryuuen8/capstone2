{% extends "admin/base_site.html" %}
{% load static %}
{% block extrastyle %}
    <!-- =========================
     LEAFLET (USE STABLE 1.9.4)
========================= -->
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- =========================
     LEAFLET DRAW
========================= -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <!-- =========================
     FONT AWESOME (optional UI)
========================= -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        #map {
            width: 100%;
            height: calc(100vh - 140px);
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e5e7eb;
        }

        .map-wrapper {
            padding: 20px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .toolbar button {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .toolbar button:hover {
            background: #1d4ed8;
        }
    </style>
{% endblock %}
{% block content %}
    <div class="map-wrapper">
        <h1>Indoor Navigation Map Editor</h1>
        <div id="map"></div>
        {{ path|json_script:"path-data" }}
        {{ locations|json_script:"locations-data" }}
        <div class="toolbar">
            <button onclick="saveRooms()">Save Room</button>
        </div>
    </div>
    <!-- =========================
     SCRIPTS (IMPORTANT ORDER)
========================= -->
    <!-- Leaflet FIRST -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- AntPath (if you use paths elsewhere) -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
    <!-- Leaflet Draw (AFTER Leaflet) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <!-- Your map logic -->
    <script src="{% static 'admin/admin-map.js' %}"></script>
    <!-- CSRF helper -->
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
{% endblock %}
