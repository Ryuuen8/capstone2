{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- CSS Files -->
        <link rel="stylesheet" href="{% static "css/main.css" %}">
        <link rel="stylesheet" href="{% static "css/emergency.css" %}">
        <link rel="stylesheet" href="{% static "css/floor-maps.css" %}">
        <!-- Leaflet CSS -->
        <link rel="stylesheet"
              href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
              integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
              crossorigin="" />
        <!-- Font Awesome -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <!-- Barcode Scanner -->
        <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.2.4000/dist/dbr.bundle.js"></script>
        <!-- Leaflet JavaScript -->
        <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
                integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
                crossorigin=""></script>
        <!-- Leaflet Ant Path -->
        <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
        <script src="https://unpkg.com/@elfalem/leaflet-curve"></script>
        <!-- Eruda for debugging -->
        <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
        <script>
            eruda.init();
        </script>
        <!-- CSRF Token Script -->
        <script id="csrf-data">
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(
                                cookie.substring(name.length + 1)
                            );
                            break;
                        }
                    }
                }
                return cookieValue;
            }
            const csrftoken = getCookie('csrftoken');
        </script>
        <title>
            {% block title %}
                My App
            {% endblock title %}
        </title>
        {% block css %}
            <link rel="stylesheet" href="{% static 'css/style.css' %}">
        {% endblock css %}
        <script>
            async function scan() {
                const result = await new Dynamsoft.BarcodeScanner({
                    license: "YOUR_LICENSE_KEY_HERE",
                    barcodeFormats: [Dynamsoft.DBR.EnumBarcodeFormat.BF_QR_CODE]
                }).launch();
                if (result?.barcodeResults?.length) {
                    window.location.href = result.barcodeResults[0].barcodeText;
                }
            };
        </script>
        {% block extra_head %}
        {% endblock extra_head %}
    </head>
    <body>
        <!-- MAIN CONTENT AREA -->
        <main class="page-container">
            {% block content %}{% endblock %}
        </main>
        <!-- BOTTOM NAV (ALWAYS PRESENT) -->
        <nav class="bottom-nav">
            <a href="{% url 'main' %}" class="{% block nav_home %}{% endblock %}">
                <i class="fa fa-home"></i>
                <span>Home</span>
            </a>
            <a href="{% url 'mainmap' %}" class="{% block nav_map %}{% endblock %}">
                <i class="fa fa-map"></i>
                <span>Map</span>
            </a>
            <!-- CENTER SCAN BUTTON -->
            <div id="reader" class="scan-btn-container"></div>
            <a onclick="scan()" class="scan-btn">
                <i class="fa fa-qrcode"></i>
            </a>
            <a href="{% url 'emergency' %}"
               class="{% block nav_emergency %}{% endblock %}">
                <i class="fa fa-exclamation-circle"></i>
                <span>Emergency</span>
            </a>
            <a>
                <i class="fa-solid fa-ellipsis"></i>
                <span>More</span>
            </a>
        </nav>
        {% block extra_scripts %}
        {% endblock extra_scripts %}
    </body>
</html>
