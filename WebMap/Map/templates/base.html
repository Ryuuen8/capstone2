{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static "css/main.css" %}">
        <link rel="stylesheet" href="{% static "css/emergency.css" %}">
        <script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.2.4000/dist/dbr.bundle.js"></script>
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <title>
            {% block title %}
                My App
            {% endblock title %}
        </title>
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <script>
            async function scan() {
                const result = await new Dynamsoft.BarcodeScanner({
                    license: "YOUR_LICENSE_KEY_HERE",
                    barcodeFormats: [Dynamsoft.DBR.EnumBarcodeFormat.BF_QR_CODE]
                }).launch();
                if (result?.barcodeResults?.length) {
                    window.location.href = result.barcodeResults[0].barcodeText;
                }
            };
        </script>
    </head>
    <body>
        <!-- MAIN CONTENT AREA -->
        <main class="page-container">
            {% block content %}{% endblock %}
        </main>
        <!-- BOTTOM NAV (ALWAYS PRESENT) -->
        <nav class="bottom-nav">
            <a href="{% url 'main' %}" class="{% block nav_home %}{% endblock %}">
                <i class="fa fa-home"></i>
                <span>Home</span>
            </a>
            <a href="{% url 'mainmap' %}" class="{% block nav_map %}{% endblock %}">
                <i class="fa fa-map"></i>
                <span>Map</span>
            </a>
            <!-- CENTER SCAN BUTTON -->
            <div id="reader" class="scan-btn-container"></div>
            <a onclick="scan()" class="scan-btn">
                <i class="fa fa-qrcode"></i>
            </a>
            <a href="{% url 'emergency' %}"
               class="{% block nav_emergency %}{% endblock %}">
                <i class="fa fa-exclamation-circle"></i>
                <span>Emergency</span>
            </a>
            <a>
                <i class="fa-solid fa-ellipsis"></i>
                <span>More</span>
            </a>
        </nav>
        <script>
            console.log(Html5QrcodeScannner);
        </script>
    </body>
</html>
