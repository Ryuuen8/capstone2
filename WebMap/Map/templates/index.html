{% load static %}
{% block content %}
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" href="{% static "style.css" %}">
            <script src="{% static "script.js" %}"></script>
            <link rel="stylesheet"
                  href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
                  integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
                  crossorigin="" />
            <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
                    integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
                    crossorigin=""></script>
            <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
            <link rel="stylesheet"
                  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
            <script>
                eruda.init();
            </script>
            <script id="csrf-data">
                function getCookie(name) {
                    let cookieValue = null;

                    if (document.cookie && document.cookie !== '') {

                        const cookies = document.cookie.split(';');

                        for (let i = 0; i < cookies.length; i++) {

                            const cookie = cookies[i].trim();

                            if (cookie.substring(0, name.length + 1) === (name + '=')) {

                                cookieValue = decodeURIComponent(
                                    cookie.substring(name.length + 1)
                                );

                                break;
                            }
                        }
                    }

                    return cookieValue;
                }

                const csrftoken = getCookie('csrftoken');
            </script>
            <title>Document</title>
        </head>
        <body>
            <!-- Leaflet map -->
            <div id="map"></div>
            <div class="floor-container">
                <div class="fmenu-container">
                    <button class="floors-box"
                            id="floorBtn"
                            aria-expanded="false"
                            aria-controls="floorMenu">
                        <span class="floors">Floors</span>
                    </button>
                    <div class="floor-menu" id="floorMenu">
                        <button class="floor-item">Ground Floor</button>
                        <button class="floor-item">2nd Floor</button>
                        <button class="floor-item">3rd Floor</button>
                        <button class="floor-item">4th Floor</button>
                    </div>
                </div>
            </div>
            <div class="app-container">
                <div class="menu-container">
                    <div class="menu-box">
                        <i class="fa-solid fa-book"></i>
                    </div>
                    <div class="menu-box">
                        <i class="fa-solid fa-desktop"></i>
                    </div>
                    <div class="menu-box">
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                    <div class="menu-box">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="menu-box">
                        <i class="fa-solid fa-phone"></i>
                    </div>
                </div>
            </div>
            {{ locations|json_script:"locations-data" }}
            {{ path|json_script:"path-data" }}
            <script src="{% static "map.js" %}"></script>
        </body>
    </html>
{% endblock %}
