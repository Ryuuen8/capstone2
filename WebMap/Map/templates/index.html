{% load static %}
{% block content %}
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <link rel="stylesheet" href="{% static "style.css" %}">
            <link rel="stylesheet"
                  href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
                  integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
                  crossorigin="" />
            <script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
                    integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
                    crossorigin=""></script>
            <script src="https://cdn.jsdelivr.net/npm/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.min.js"></script>
            <title>Document</title>
        </head>
        <body>
            <div class="Header">
                <img src="{% static 'apple-maps.svg' %}" alt="test" height="50" width="50">
                <div class="item-1">
                    <h1>Navigation</h1>
                </div>
                <input type="text" placeholder="Search.." class="search-field">
            </div>
            <div class="icon-button">
                <button class="btn-exit">
                    <img src="{% static 'Exit_icon.svg' %}"
                         alt="test"
                         height="125"
                         width="125">
                    <a href="https://www.youtube.com/results?search_query=umapyoi+densetsu"></a>
                </button>
                <h1>Test2</h1>
            </div>
            <div id="map">
                {{ locations|json_script:"locations-data" }}
                {{ path|json_script:"path-data" }}
                <script src="{% static "script.js" %}"></script>
            </div>
        </body>
    </html>
{% endblock %}
